<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dev_type | Ultimate Custom Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0b0f1a; --bg-card: rgba(23, 32, 53, 0.7); --text-main: #f8fafc;
            --text-sub: #64748b; --primary: #38bdf8; --secondary: #818cf8; --error: #f43f5e; --border: rgba(255, 255, 255, 0.05);
            --rank-bronze: #cd7f32; --rank-silver: #c0c0c0; --rank-gold: #ffd700; --rank-diamond: #b9f2ff;
        }

        body.theme-sakura { --primary: #fda4af; --secondary: #fb7185; --bg-body: #1c1917; }
        body.theme-forest { --primary: #4ade80; --secondary: #22c55e; --bg-body: #061006; }
        body.theme-neon { --primary: #f0abfc; --secondary: #c026d3; --bg-body: #0f0514; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-body); color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; transition: 0.5s; overflow: hidden;
        }

        .app-container {
            background: var(--bg-card); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 32px;
            padding: 40px; width: 95%; max-width: 950px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative;
        }

        .progress-bar-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 6px;
            background: rgba(255,255,255,0.03); border-radius: 32px 32px 0 0; overflow: hidden;
        }
        #progress-bar {
            height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: 0.2s ease; box-shadow: 0 0 15px var(--primary);
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .brand { font-size: 1.6rem; font-weight: 800; }
        .brand span { color: var(--primary); }

        .nav-tabs { display: flex; gap: 8px; background: rgba(0,0,0,0.2); padding: 6px; border-radius: 16px; }
        .tab-btn {
            background: none; border: none; color: var(--text-sub);
            padding: 10px 22px; border-radius: 12px; cursor: pointer;
            font-weight: 600; font-size: 0.85rem; transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: #000; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: rgba(0,0,0,0.2); padding: 18px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
        .stat-label { font-size: 0.65rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 4px; display: block; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 1.7rem; color: var(--primary); font-weight: 600; }

        .survival-container { width: 100%; height: 4px; background: rgba(244, 63, 94, 0.1); margin-bottom: 15px; border-radius: 2px; display: none; }
        #survival-bar { height: 100%; width: 100%; background: var(--error); transition: width 0.1s linear; }

        #typing-area {
            font-family: 'JetBrains Mono', monospace; font-size: 1.75rem; line-height: 2.8rem;
            color: var(--text-sub); min-height: 160px; position: relative; margin: 2rem 0;
            transition: opacity 0.3s ease;
        }
        .char.correct { color: var(--text-main); }
        .char.incorrect { color: var(--error); border-bottom: 2px solid var(--error); }
        #caret { position: absolute; width: 3px; height: 1.9rem; background: var(--primary); border-radius: 2px; transition: 0.1s; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .chart-container {
            background: rgba(0,0,0,0.2); height: 220px; border-radius: 24px;
            display: flex; align-items: flex-end; gap: 12px; padding: 40px 25px 25px 25px; justify-content: center;
        }
        .bar { width: 32px; border-radius: 8px 8px 4px 4px; position: relative; transition: height 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .bar::after { content: attr(data-wpm); position: absolute; top: -25px; left: 50%; transform: translateX(-50%); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 700; color: inherit; filter: brightness(1.2); }

        .custom-input-area { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 20px; padding: 20px; color: #fff; font-family: 'JetBrains Mono', monospace; resize: none; outline: none; margin-bottom: 15px; }
        .custom-input-area:focus { border-color: var(--primary); }

        #input-field { opacity: 0; position: absolute; pointer-events: none; }
        .view { display: none; }
        .view.active { display: block; }

        .theme-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: 0.2s; }
        .theme-dot:hover { transform: scale(1.2); border-color: #fff; }

        #modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); z-index: 100; justify-content: center; align-items: center; }
        .modal { background: #111827; padding: 45px; border-radius: 32px; text-align: center; border: 1px solid var(--primary); width: 420px; }

        /* Estilo para a lista de textos customizados */
        .custom-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 8px; margin-bottom: 5px; }
        .btn-delete { background: none; border: none; color: var(--error); cursor: pointer; font-size: 0.7rem; font-weight: bold; padding: 4px 8px; border-radius: 4px; transition: 0.2s; }
        .btn-delete:hover { background: rgba(244, 63, 94, 0.1); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="progress-bar-container"><div id="progress-bar"></div></div>

        <header>
            <div class="brand">dev_<span>type</span></div>
            <nav class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('game-view')">⌨️ Arena</button>
                <button class="tab-btn" onclick="switchTab('custom-view')">📝 Editor</button>
                <button class="tab-btn" onclick="switchTab('stats-view')">📊 Dashboard</button>
            </nav>
        </header>

        <div id="game-view" class="view active">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <div style="display:flex; gap:15px; align-items:center;">
                  
                    <label style="display:flex; align-items:center; gap:8px; color:var(--text-sub); font-size:0.8rem; cursor:pointer;"><input type="checkbox" id="sound-mode" checked> 🔊 SOM</label>
                </div>
                <div style="font-size: 0.7rem; color: var(--text-sub);">RANK: <span id="rank-name" style="color: var(--primary); font-weight: bold;">BRONZE</span></div>
            </div>
            <div class="survival-container" id="survival-box"><div id="survival-bar"></div></div>
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-label">WPM</span><div class="stat-value" id="wpm">0</div></div>
                <div class="stat-card"><span class="stat-label">Precisão</span><div class="stat-value" id="accuracy">100%</div></div>
                <div class="stat-card"><span class="stat-label">Tempo</span><div class="stat-value" id="timer">30</div></div>
                <div class="stat-card"><span class="stat-label">Recorde</span><div class="stat-value" id="high-score">0</div></div>
            </div>
            <div id="typing-area"><div id="caret"></div><div id="text-display"></div></div>
            <input type="text" id="input-field" autofocus autocomplete="off" spellcheck="false">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div class="theme-selector" style="display: flex; gap: 8px;">
                    <div class="theme-dot" style="background: #38bdf8;" onclick="setTheme('')"></div>
                    <div class="theme-dot" style="background: #fb7185;" onclick="setTheme('theme-sakura')"></div>
                    <div class="theme-dot" style="background: #4ade80;" onclick="setTheme('theme-forest')"></div>
                    <div class="theme-dot" style="background: #c026d3;" onclick="setTheme('theme-neon')"></div>
                </div>
                <p style="color: var(--text-sub); font-size: 0.75rem;">Aperte <kbd style="background:#334155; padding:2px 5px; border-radius:4px; color:#fff;">TAB</kbd> para resetar</p>
            </div>
        </div>

        <div id="custom-view" class="view">
            <h3 style="margin-bottom: 10px;">Adicionar Textos de Treino</h3>
            <textarea id="custom-text-input" class="custom-input-area" rows="5" placeholder="Cole aqui seu texto personalizado..."></textarea>
            <button onclick="saveCustomText()" style="background:var(--primary); border:none; padding:12px 25px; border-radius:12px; font-weight:700; cursor:pointer; width:100%; color:#000">SALVAR NA BIBLIOTECA</button>
            <div id="custom-list" style="margin-top: 20px; max-height: 200px; overflow-y: auto; font-size: 0.8rem; color: var(--text-sub);"></div>
        </div>

        <div id="stats-view" class="view">
            <div class="stats-grid">
                <div class="stat-card"><span class="stat-label">Média WPM</span><div class="stat-value" id="avg-wpm">0</div></div>
                <div class="stat-card"><span class="stat-label">Melhor Teste</span><div class="stat-value" id="max-wpm">0</div></div>
                <div class="stat-card"><span class="stat-label">Total Arena</span><div class="stat-value" id="total-tests">0</div></div>
                <div class="stat-card"><span class="stat-label">Melhor ACC</span><div class="stat-value" id="best-acc">0%</div></div>
            </div>
            <div class="chart-container" id="history-chart"></div>
            <button onclick="clearData()" style="margin-top:20px; background:none; border:none; color:var(--error); cursor:pointer; font-size:0.7rem; width:100%; text-transform:uppercase;">LIMPAR HISTÓRICO</button>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal">
            <div id="medal-emoji" style="font-size: 4rem; margin-bottom: 10px;">🥉</div>
            <h2 id="modal-title" style="color: var(--primary); margin-bottom: 20px;">Fim de jogo!</h2>
            <div style="display:flex; justify-content: space-around; margin-bottom: 30px;">
                <div><small style="color:var(--text-sub)">SPEED</small><div class="stat-value" id="final-wpm">0</div></div>
                <div><small style="color:var(--text-sub)">ACC</small><div class="stat-value" id="final-acc">0%</div></div>
            </div>
            <button onclick="closeModal()" style="background:var(--primary); border:none; padding:18px; border-radius:18px; font-weight:800; cursor:pointer; width:100%; color:#000">RECOMEÇAR (TAB)</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playClick(type) {
            if(!document.getElementById('sound-mode').checked) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type === 'correct') { osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05); }
            else if (type === 'error') { osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1); }
            else if (type === 'success') { osc.type = 'triangle'; osc.frequency.setValueAtTime(400, audioCtx.currentTime); gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2); }
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        const defaultTexts = [];
        let timer, survivalTimer, timeLeft = 30, survivalLife = 100, isTyping = false, charIdx = 0, mistakes = 0;
        const input = document.getElementById('input-field');

        function switchTab(t) {
            document.querySelectorAll('.view, .tab-btn').forEach(e => e.classList.remove('active'));
            document.getElementById(t).classList.add('active');
            event.target.classList.add('active');
            if(t === 'stats-view') renderStats(); 
            if(t === 'custom-view') renderCustomList();
            if(t === 'game-view') resetGame();
        }

        function loadText() {
            const custom = JSON.parse(localStorage.getItem('dt_custom_texts') || '[]');
            const allTexts = [...defaultTexts, ...custom];
            const txt = allTexts[Math.floor(Math.random()*allTexts.length)];
            document.getElementById('text-display').innerHTML = txt.split('').map(c => `<span class="char">${c}</span>`).join('');
            updateCaret();
        }

        function saveCustomText() {
            const val = document.getElementById('custom-text-input').value.trim();
            if(!val) return;
            const custom = JSON.parse(localStorage.getItem('dt_custom_texts') || '[]');
            custom.push(val);
            localStorage.setItem('dt_custom_texts', JSON.stringify(custom));
            document.getElementById('custom-text-input').value = "";
            renderCustomList();
        }

        function deleteCustomText(index) {
            const custom = JSON.parse(localStorage.getItem('dt_custom_texts') || '[]');
            custom.splice(index, 1);
            localStorage.setItem('dt_custom_texts', JSON.stringify(custom));
            renderCustomList();
        }

        function renderCustomList() {
            const custom = JSON.parse(localStorage.getItem('dt_custom_texts') || '[]');
            const container = document.getElementById('custom-list');
            if(custom.length === 0) {
                container.innerHTML = "Nenhum texto extra na biblioteca.";
                return;
            }
            container.innerHTML = "Sua biblioteca:<br><br>" + custom.map((txt, i) => `
                <div class="custom-item">
                    <span style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80%;">${txt}</span>
                    <button class="btn-delete" onclick="deleteCustomText(${i})">EXCLUIR</button>
                </div>
            `).join('');
        }

        function updateCaret() {
            const chars = document.querySelectorAll('.char');
            const caret = document.getElementById('caret');
            if(chars[charIdx]) { caret.style.left = chars[charIdx].offsetLeft + 'px'; caret.style.top = chars[charIdx].offsetTop + 'px'; }
        }

        input.addEventListener('input', () => {
            const chars = document.querySelectorAll('.char');
            const typed = input.value.split('')[charIdx];
            if(!isTyping) { 
                timer = setInterval(countDown, 1000); 
                if(document.getElementById('survival-mode').checked) survivalTimer = setInterval(updateSurvival, 50);
                isTyping = true; 
            }
            survivalLife = 100;
            if(typed == null) { if(charIdx > 0) { charIdx--; chars[charIdx].classList.remove('correct', 'incorrect'); } }
            else {
                if(chars[charIdx].innerText === typed) { chars[charIdx].classList.add('correct'); playClick('correct'); }
                else { mistakes++; chars[charIdx].classList.add('incorrect'); playClick('error'); }
                charIdx++;
            }
            document.getElementById('progress-bar').style.width = (charIdx/chars.length)*100 + '%';
            updateCaret(); updateLiveStats();
            if(charIdx === chars.length) { playClick('success'); finish(); }
        });

        function updateSurvival() {
            document.getElementById('survival-box').style.display = 'block';
            survivalLife -= 2.0; 
            document.getElementById('survival-bar').style.width = survivalLife + '%';
            document.getElementById('typing-area').style.opacity = survivalLife / 100;
            if(survivalLife <= 0) finish("O texto desapareceu!");
        }

        function countDown() { if(timeLeft > 0) { timeLeft--; document.getElementById('timer').innerText = timeLeft; } else finish(); }

        function updateLiveStats() {
            let wpm = Math.round(((charIdx - mistakes)/5)/((30-timeLeft+0.01)/60));
            document.getElementById('wpm').innerText = Math.max(0, wpm);
            let acc = Math.round(((charIdx - mistakes)/(charIdx||1))*100);
            document.getElementById('accuracy').innerText = acc + "%";
            let rank = wpm > 80 ? "DIAMANTE" : wpm > 60 ? "OURO" : wpm > 40 ? "PRATA" : "BRONZE";
            document.getElementById('rank-name').innerText = rank;
        }

        function finish(msg) {
            clearInterval(timer); clearInterval(survivalTimer);
            const wpm = parseInt(document.getElementById('wpm').innerText);
            const acc = parseInt(document.getElementById('accuracy').innerText);
            let h = JSON.parse(localStorage.getItem('dt_h') || '[]');
            h.push({wpm, acc}); localStorage.setItem('dt_h', JSON.stringify(h));
            let high = localStorage.getItem('dt_high') || 0;
            if(wpm > high) localStorage.setItem('dt_high', wpm);
            document.getElementById('modal-title').innerText = msg || (wpm > 50 ? "Incrível!" : "Bom teste!");
            document.getElementById('medal-emoji').innerText = wpm > 80 ? "💎" : wpm > 60 ? "🥇" : wpm > 40 ? "🥈" : "🥉";
            document.getElementById('final-wpm').innerText = wpm;
            document.getElementById('final-acc').innerText = acc + "%";
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function renderStats() {
            const h = JSON.parse(localStorage.getItem('dt_h') || '[]');
            const max = Math.max(...h.map(i=>i.wpm), 0);
            document.getElementById('avg-wpm').innerText = h.length ? Math.round(h.reduce((a,b)=>a+b.wpm,0)/h.length) : 0;
            document.getElementById('max-wpm').innerText = max;
            document.getElementById('total-tests').innerText = h.length;
            document.getElementById('best-acc').innerText = h.length ? Math.max(...h.map(i=>i.acc)) + "%" : "0%";
            document.getElementById('history-chart').innerHTML = h.slice(-12).map(i => {
                const height = (i.wpm / (max || 100)) * 100;
                let color = i.wpm > 80 ? 'var(--rank-diamond)' : i.wpm > 60 ? 'var(--rank-gold)' : i.wpm > 40 ? 'var(--rank-silver)' : 'var(--rank-bronze)';
                return `<div class="bar" data-wpm="${i.wpm}" style="height: ${height}%; background: ${color}; color: ${color};"></div>`;
            }).join('');
        }

        function resetGame() {
            clearInterval(timer); clearInterval(survivalTimer);
            timeLeft = 30; charIdx = 0; mistakes = 0; isTyping = false; survivalLife = 100;
            input.value = ""; document.getElementById('timer').innerText = 30;
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('survival-box').style.display = 'none';
            document.getElementById('typing-area').style.opacity = "1";
            document.getElementById('high-score').innerText = localStorage.getItem('dt_high') || 0;
            loadText(); input.focus();
        }

        function setTheme(t) { document.body.className = t; localStorage.setItem('dt_theme', t); }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; resetGame(); }
        function clearData() { if(confirm("Apagar tudo?")) { localStorage.clear(); renderStats(); renderCustomList(); } }
        window.addEventListener('keydown', (e) => { if(e.key === 'Tab') { e.preventDefault(); closeModal(); resetGame(); } });
        document.addEventListener('click', () => { if(document.activeElement.tagName !== 'TEXTAREA' && document.getElementById('game-view').classList.contains('active')) input.focus(); });
        document.body.className = localStorage.getItem('dt_theme') || '';
        resetGame();
    </script>
</body>
</html>
